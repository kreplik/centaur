github_token_inject:
  namespace: acme
  name: github-token
  description: GitHub PAT injected as a bearer token
  labels:
    team: platform
  inject_config:
    header: Authorization
    formatter: "Bearer {{ .Value }}"
  created_by: acme_admin

db_password_replace:
  namespace: acme
  name: db_password
  description: Database password swapped in for the placeholder
  labels: {}
  replace_config:
    proxy_value: __DB_PASSWORD__
    match_headers:
      - Authorization
    match_body: true
    require: true
  created_by: acme_admin

acme_prod_api_key:
  namespace: acme
  foreign_id: prod-api-key
  name: prod-api-key
  description: Prod API key
  labels:
    team: platform
    env: prod
  inject_config:
    header: X-Api-Key
    formatter: "{{ .Value }}"
  created_by: acme_admin

acme_staging_api_key:
  namespace: acme
  name: staging-api-key
  description: Staging API key
  labels:
    team: platform
    env: staging
  inject_config:
    header: X-Api-Key
    formatter: "{{ .Value }}"
  created_by: acme_admin

globex_prod_secret:
  namespace: globex
  name: prod-secret
  description: Globex prod secret (should not leak into acme searches)
  labels:
    team: platform
    env: prod
  inject_config:
    header: X-Api-Key
    formatter: "{{ .Value }}"
  created_by: globex_admin
